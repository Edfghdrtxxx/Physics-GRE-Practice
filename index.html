<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physics GRE · Prep Studio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#936;</text></svg>">
  <!-- ?v= is a cache-buster: bump it whenever these files change so browsers
       can never serve a stale copy -->
  <link rel="stylesheet" href="css/style.css?v=20260718a">
  <link rel="stylesheet" href="css/print.css?v=20260718a" media="print">
  <link rel="stylesheet" href="vendor/katex/katex.min.css">
</head>
<body>
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-name">Physics <span class="accent">GRE</span></div>
      <div class="brand-sub">Prep Studio · exam Oct 28, 2026</div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div id="sidebar-footer">
      <button id="theme-toggle" class="btn btn-ghost btn-sm" type="button">Dark mode</button>
    </div>
  </aside>

  <main id="main">
    <div id="topbar">
      <div class="topbar-inner">
        <button id="sidebar-toggle" class="topbar-arrow" type="button"
                aria-expanded="true" aria-controls="sidebar"
                aria-label="Hide sidebar" title="Hide sidebar">&#9776;</button>
        <div class="topbar-arrows">
          <button id="topbar-back" class="topbar-arrow" type="button"
                  aria-label="Go back" title="Back">&#9664;</button>
          <button id="topbar-fwd" class="topbar-arrow" type="button"
                  aria-label="Go forward" title="Forward">&#9654;</button>
        </div>
        <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumb"></nav>
        <!-- focus timer quick control — lives in the top bar (not the sidebar)
             so folding the sidebar never hides it -->
        <div id="focus-timer" class="focus-timer">
          <div class="focus-row">
            <button id="focus-toggle" class="focus-toggle" type="button"
                    aria-pressed="false" aria-label="Start focus timer"
                    title="Times reading &amp; derivations you do away from the app.">
              <span class="focus-dot" aria-hidden="true"></span>
              <span id="focus-label" class="focus-label">Start focus</span>
            </button>
            <a id="focus-open" class="focus-open" href="#/focus"
               aria-label="Open the focus page" title="Open the full focus page">
              <span id="focus-time" class="focus-time" hidden>0:00</span>
              <span class="focus-open-ico" aria-hidden="true">&#10530;</span>
            </a>
          </div>
        </div>
      </div>
    </div>
    <div id="view"></div>
  </main>

  <div id="toasts"></div>

  <!-- vendored libraries (fully offline) -->
  <script src="vendor/marked.min.js"></script>
  <script defer src="vendor/katex/katex.min.js"></script>
  <script defer src="vendor/katex/contrib/auto-render.min.js"></script>

  <!-- data -->
  <script src="js/data-topics.js"></script>
  <script src="js/data-questions.js"></script>
  <script src="js/data-formulas.js"></script>
  <script src="js/data-achievements.js"></script>
  <script src="js/data-plan.js"></script>

  <!-- book-derived bank (gitignored; generated placeholders until the
       extraction pipeline fills them) -->
  <script src="content/bank/cpg-questions.js"></script>
  <script src="content/bank/cpg-exams.js"></script>
  <script src="content/bank/cpg-formulas.js"></script>
  <script src="content/bank/ets-exams.js"></script>  <!-- released ETS exams (gitignored — ETS copyright) -->

  <!-- engine -->
  <script src="js/store.js"></script>
  <script src="js/srs.js"></script>
  <script src="js/bank.js"></script>
  <script src="js/study-time.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/focus-fx.js?v=20260718a"></script>  <!-- detector field + beamline fx for the focus page -->
  <script src="js/notes.js"></script>
  <script src="js/gamify.js"></script>

  <!-- views -->
  <script src="js/view-dashboard.js"></script>
  <script src="js/view-topic.js"></script>
  <script src="js/view-practice.js"></script>
  <script src="js/view-history.js"></script>
  <script src="js/view-analytics.js"></script>
  <script src="js/view-build.js"></script>
  <script src="js/view-search.js"></script>
  <script src="js/view-notes.js"></script>
  <script src="js/view-mistakes.js"></script>
  <script src="js/view-formulas.js"></script>
  <script src="js/view-focus.js?v=20260717d"></script>        <!-- F5 focus page -->
  <script src="js/view-study-time.js"></script>   <!-- dedicated study-time page -->
  <script src="js/view-achievements.js"></script>
  <script src="js/view-plan.js"></script>
  <script src="js/view-content.js"></script>
  <script src="js/exam-engine.js"></script>
  <script src="js/view-exam.js"></script>

  <!-- shell -->
  <script src="js/app.js"></script>
</body>
</html>
